<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .box01 {
            height: 100px;
            margin-top: 15px;
            width: 100%;
            border-radius: 4px;
        }

</head>

        <div class="col-12"><div class="box01 bg-primary"></div></div>

    <div class="row">
        <div class="col-6 col-lg-2"><div class="box01 bg-success"></div></div>
        <div class="col-6 col-lg-2"><div class="box01 bg-success"></div></div>
        <div class="col-6 col-lg-2"><div class="box01 bg-success"></div></div>
        <div class="col-6 col-lg-2"><div class="box01 bg-success"></div></div>

        <div class="col-6 col-lg-2"><div class="box01 bg-danger"></div></div>

        <div class="col-6 col-lg-2"><div class="box01 bg-danger"></div></div>
    </div>

    <div class="row">
        <div class="col-12 col-lg-4"><div class="box01 bg-warning"></div></div>
        <div class="col-12 col-lg-4"><div class="box01 bg-warning"></div></div>
        <div class="col-12 col-lg-4"><div class="box01 bg-warning"></div></div>
    </div>

    <div class="row">
        <div class="col-12"><div class="box01 bg-info"></div></div>
    </div>
</div>

</body>
</html>
