    <h2>RIIZE韓語:라이즈,羅馬化:Raijeu;讀作「rise」</h2>
    <p>粉絲名稱原為「SUNZ」썬즈,衍生自「太陽」,寓意在於粉絲們一同與RIIZE成長,讓彼此變得更加閃耀亮麗[7]。2023年9月6日,SM娛樂宣布粉絲名稱更改為「BRIIZE」,理由在於原名可能帶有負面含義[8]。「BRIIZE」衍伸自「微風」breeze,寓意在於粉絲們將隨時隨地陪伴在團體身邊,並幫助及帶領團體展翅翱翔。
