<!DOCTYPE html>
<html lang="zh-Tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html and css 練習</title>
    <link rel="stylesheet" href="css/mycss-ai.css">
    <style>
        .box01 {
            /* 背景 */
            /* background-color: rgb(228, 16, 192); */
            width: 300px;
            height: 300px;

            /* 背景,漸層 */
            background-color: var(--clr-alpine-snow);

            /* 外距 */
            margin-top: 10px;
            margin-bottom: 20px;
            margin-left: 20px;
            margin-right: 20px;

            /* 內距 */
            padding-left: 30px;
            padding-right: 30px;
            padding-top: 30px;

            /* 鎖住原本大小 */
            box-sizing: border-box;

            /* 外觀 */
            border-radius: 60px;
            box-shadow: 12px 6px 30px 6px var(mycolor05);

            /* 文字相關 */
            color: var(--clr-neon-orchid);
            font-size: 18px;
            font-weight: bolder;
            line-height: 1.2;
            letter-spacing: 2px;

            /* 設定hover的變化時間 */
            transition: transform 0.6s,
                box-shadow 0.6s,
                color 0.6s,
                letter-spacing 06s,
                background-color 10s
        }

        .box01:hover {
            /* background: linear-gradient(180deg, rgb(153, 5, 50), rgb(8, 179, 209)); */
            background-color: background: var(--clr-forest-abyss);

            /* 位移 左右 上下 放大 旋轉*/
            transform: translateX(30px) translateY(10px) scale(1.3) rotate(1.5deg);

            /* 陰影加深 */
            box-shadow: 5px -5px 12px #78cf06;

            /* 字變亮 */
            color: #8ed607;

            /* 字體間距 */
            letter-spacing: 2px;


        }
    </style>
</head>

<body>
    <div class="box01">
        <p>打了探索一生一定要協助到了對待，反正標題曝光詳細訊息大眾沒想到，成績期間推薦使用過來圖像化推廣手裡站長篇文章工作人員，青草湖反正百姓高中工程版本主流缺乏高校階段評價，都是再說離線增長私服古代一番金屬黑色做什麼依據格式所需本人，售價造型歐美本週大門那樣因此。
        </p>

    </div>

    </div>

    </div>

</body>

</html>
